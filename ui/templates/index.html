<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otonom-EH | Bilişsel Elektronik Harp Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #07090e;
            --panel-bg: rgba(21, 25, 33, 0.85);
            --accent: #00f2ff;
            --text: #e0e0e0;
            --hazard: #ff3e3e;
            --success: #00ff88;
            --border: rgba(0, 242, 255, 0.2);
            --manual: #ff0055;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: radial-gradient(circle at center, #0f131c 0%, #07090e 100%);
        }

        header {
            padding: 1rem 2rem;
            background: var(--panel-bg);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .title-group h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .title-group p {
            margin: 0;
            font-size: 0.75rem;
            opacity: 0.7;
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 1.5rem;
            padding: 1.5rem;
            height: calc(100vh - 100px);
        }

        #waterfall-container {
            position: relative;
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.8);
        }

        #waterfall-canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            overflow-y: auto;
            padding-right: 5px;
        }

        .side-panel::-webkit-scrollbar { width: 5px; }
        .side-panel::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 5px; }

        .panel {
            background: var(--panel-bg);
            border-radius: 8px;
            padding: 1rem;
            border-left: 3px solid var(--accent);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
        }

        .panel-title {
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
            color: var(--accent);
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.5rem;
        }

        #signal-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 0.85rem;
            max-height: 150px;
            overflow-y: auto;
        }

        .signal-item {
            padding: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: grid;
            grid-template-columns: 1fr 1fr;
            transition: all 0.3s;
        }

        .signal-item:hover {
            background: rgba(0, 242, 255, 0.1);
            padding-left: 10px;
        }

        .status-badge {
            background: rgba(0, 255, 136, 0.15);
            color: var(--success);
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid var(--success);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .system-logs {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.75rem;
            height: 100px;
            overflow-y: auto;
            color: rgba(255, 255, 255, 0.6);
        }

        .log-entry { margin-bottom: 4px; border-left: 2px solid rgba(255,255,255,0.2); padding-left: 5px; }
        .log-entry span { color: var(--accent); }

        .chart-container {
            position: relative;
            height: 150px;
            width: 100%;
            margin-top: 10px;
        }

        /* Scanning Animation */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent), 0 0 40px var(--accent);
            opacity: 0.7;
            animation: scan 4s linear infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        
        #ea-status-text {
            font-size: 1.1rem; 
            font-weight: bold; 
            transition: color 0.3s;
        }
        
        /* Operator Controls */
        input[type=range] {
            -webkit-appearance: none;
            background: rgba(255,255,255,0.1);
            height: 4px;
            border-radius: 2px;
            outline: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 15px;
            height: 15px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        <div class="title-group">
            <h1>Otonom-EH Suite v3.0</h1>
            <p>Cognitive Electronic Warfare Infrastructure | PyTorch/OpenCV ACTIVE</p>
        </div>
        <div class="status-badge">SDR STREAM: ONLINE</div>
    </header>

    <main>
        <div id="waterfall-container">
            <div class="scan-line"></div>
            <canvas id="waterfall-canvas"></canvas>
        </div>

        <div class="side-panel">
            
            <!-- Operator Control Deck -->
            <div class="panel" style="border-left-color: var(--manual);">
                <div class="panel-title" style="color: var(--manual);">OPERATÖR KOMUTA MERKEZİ</div>
                
                <div style="margin-bottom: 10px;">
                    <label style="font-size: 0.8rem; display: block; margin-bottom: 5px;">SİSTEM MODU</label>
                    <div style="display: flex; gap: 10px;">
                        <button id="btn-auto" onclick="setMode('AUTO')" style="flex:1; padding: 5px; background: var(--accent); color: #000; border: none; font-weight: bold; cursor: pointer; border-radius: 3px; font-family: inherit;">OTONOM (AI)</button>
                        <button id="btn-manual" onclick="setMode('MANUAL')" style="flex:1; padding: 5px; background: transparent; color: #fff; border: 1px solid #555; cursor: pointer; border-radius: 3px; font-family: inherit;">MANUEL</button>
                    </div>
                </div>

                <div style="margin-bottom: 10px;">
                    <label style="font-size: 0.8rem; display: flex; justify-content: space-between;">
                        <span>MANUEL KARIŞTIRMA</span>
                        <span id="jam-status" style="color: #555;">KAPALI</span>
                    </label>
                    <button id="btn-jam" onmousedown="setJam(true)" onmouseup="setJam(false)" onmouseleave="setJam(false)" style="width: 100%; padding: 10px; background: #333; color: #777; border: 1px solid #555; font-weight: bold; cursor: not-allowed; border-radius: 3px; margin-top: 5px; font-family: inherit; font-size: 0.9rem;" disabled>
                        TAARRUZ (BASILI TUT)
                    </button>
                </div>

                <div style="margin-bottom: 15px;">
                    <a href="/api/export_report" target="_blank" style="text-decoration: none;">
                        <button style="width: 100%; padding: 8px; background: rgba(0,255,136,0.1); color: var(--success); border: 1px solid var(--success); cursor: pointer; border-radius: 3px; font-family: inherit; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">AAR RAPORUNU İNDİR (CSV)</button>
                    </a>
                </div>

                <div>
                    <label style="font-size: 0.8rem; display: flex; justify-content: space-between;">
                        <span>GÜRÜLTÜ SEVİYESİ (NOISE)</span>
                        <span id="noise-val">-100 dB</span>
                    </label>
                    <input type="range" id="noise-slider" min="-120" max="-40" value="-100" step="1" style="width: 100%; margin-top: 5px;" oninput="setNoise(this.value)">
                </div>
            </div>

            <!-- ET Status & Q-Learning -->
            <div class="panel">
                <div class="panel-title">BİLİŞSEL ET DURUMU</div>
                <div id="ea-status-text" style="color: var(--success)">AĞ ARAMASI...</div>
                <div style="display: flex; justify-content: space-between; margin-top: 10px; font-size: 0.8rem; opacity: 0.8;">
                    <span>Hedef: <strong id="target-count">0</strong></span>
                    <span>Q-Ödül: <strong id="total-reward" style="color: var(--accent)">0</strong></span>
                </div>
                <!-- Reward Chart -->
                <div class="chart-container" style="height: 80px;">
                    <canvas id="rewardChart"></canvas>
                </div>
            </div>

            <!-- Signal Detection & DF -->
            <div class="panel">
                <div class="panel-title">
                    <span>YÖN BULUCU & TESPİT</span>
                    <span id="sig-count">0</span>
                </div>
                <!-- Radar Chart for AoA -->
                <div class="chart-container" style="height: 120px;">
                    <canvas id="radarChart"></canvas>
                </div>
                <div id="signal-list" style="margin-top: 10px;"></div>
            </div>

            <!-- Logs -->
            <div class="panel">
                <div class="panel-title">SİSTEM LOGLARI (DB)</div>
                <div class="system-logs" id="logs"></div>
            </div>
        </div>
    </main>

    <script>
        const socket = io();
        const canvas = document.getElementById('waterfall-canvas');
        const ctx = canvas.getContext('2d');
        const signalList = document.getElementById('signal-list');
        const logs = document.getElementById('logs');
        const sigCount = document.getElementById('sig-count');
        const eaStatusText = document.getElementById('ea-status-text');
        const targetCountEl = document.getElementById('target-count');
        const totalRewardEl = document.getElementById('total-reward');

        // UI Controls logic
        let currentMode = 'AUTO';
        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-auto').style.background = mode === 'AUTO' ? 'var(--accent)' : 'transparent';
            document.getElementById('btn-auto').style.color = mode === 'AUTO' ? '#000' : '#fff';
            document.getElementById('btn-auto').style.border = mode === 'AUTO' ? 'none' : '1px solid #555';
            
            document.getElementById('btn-manual').style.background = mode === 'MANUAL' ? 'var(--manual)' : 'transparent';
            document.getElementById('btn-manual').style.color = mode === 'MANUAL' ? '#fff' : '#fff';
            document.getElementById('btn-manual').style.border = mode === 'MANUAL' ? 'none' : '1px solid #555';
            
            const jamBtn = document.getElementById('btn-jam');
            if(mode === 'MANUAL') {
                jamBtn.disabled = false;
                jamBtn.style.cursor = 'pointer';
                jamBtn.style.background = 'transparent';
                jamBtn.style.color = 'var(--manual)';
                jamBtn.style.borderColor = 'var(--manual)';
            } else {
                jamBtn.disabled = true;
                jamBtn.style.cursor = 'not-allowed';
                jamBtn.style.background = '#333';
                jamBtn.style.color = '#777';
                jamBtn.style.borderColor = '#555';
            }
            
            socket.emit('set_mode', { mode: mode });
        }

        function setJam(isJamming) {
            if (currentMode !== 'MANUAL') return;
            const jamBtn = document.getElementById('btn-jam');
            const jamStatus = document.getElementById('jam-status');
            
            if(isJamming) {
                jamBtn.style.background = 'var(--manual)';
                jamBtn.style.color = '#fff';
                jamStatus.innerText = 'AKTİF';
                jamStatus.style.color = 'var(--manual)';
            } else {
                jamBtn.style.background = 'transparent';
                jamBtn.style.color = 'var(--manual)';
                jamStatus.innerText = 'KAPALI';
                jamStatus.style.color = '#555';
            }
            socket.emit('set_manual_jam', { is_jamming: isJamming });
        }

        function setNoise(val) {
            document.getElementById('noise-val').innerText = `${val} dB`;
            socket.emit('set_noise_floor', { noise: val });
        }


        // Waterfall setup
        let fftSize = 1024;
        canvas.width = fftSize;
        canvas.height = 1000;
        let imgData = ctx.createImageData(fftSize, 1);

        // Chart.js Setup: Reward Line Chart
        const rewardCtx = document.getElementById('rewardChart').getContext('2d');
        const rewardChart = new Chart(rewardCtx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''),
                datasets: [{
                    label: 'RL Reward',
                    data: Array(20).fill(0),
                    borderColor: '#00f2ff',
                    backgroundColor: 'rgba(0, 242, 255, 0.1)',
                    borderWidth: 2,
                    fill: true,
                    tension: 0.4,
                    pointRadius: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false },
                    y: { 
                        display: true, 
                        grid: { color: 'rgba(255,255,255,0.05)' },
                        ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 10 } }
                    }
                },
                animation: { duration: 0 }
            }
        });

        // Chart.js Setup: Radar (AoA) Chart
        const radarCtx = document.getElementById('radarChart').getContext('2d');
        const radarChart = new Chart(radarCtx, {
            type: 'radar',
            data: {
                labels: ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'],
                datasets: [{
                    label: 'Sinyal Yoğunluğu',
                    data: [0,0,0,0,0,0,0,0],
                    backgroundColor: 'rgba(255, 62, 62, 0.4)',
                    borderColor: '#ff3e3e',
                    pointBackgroundColor: '#fff',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    r: {
                        angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                        grid: { color: 'rgba(0, 242, 255, 0.2)' },
                        pointLabels: { color: '#00f2ff', font: { size: 10 } },
                        ticks: { display: false, max: 100 }
                    }
                },
                animation: { duration: 200 }
            }
        });

        socket.on('new_spectrum_data', (data) => {
            // 1. Draw Waterfall row
            const row = data.waterfall;
            for (let i = 0; i < row.length; i++) {
                // Enhancing color mapping for cyber look (Blue/Cyan/White)
                const val = (row[i] + 100) * 2.55; 
                if (val > 180) {
                    imgData.data[i * 4] = 200; 
                    imgData.data[i * 4 + 1] = 255; 
                    imgData.data[i * 4 + 2] = 255; 
                } else if (val > 100) {
                    imgData.data[i * 4] = 0; 
                    imgData.data[i * 4 + 1] = val + 50; 
                    imgData.data[i * 4 + 2] = 255; 
                } else {
                    imgData.data[i * 4] = 0; 
                    imgData.data[i * 4 + 1] = 10; 
                    imgData.data[i * 4 + 2] = val * 0.8; 
                }
                imgData.data[i * 4 + 3] = 255;
            }
            
            ctx.globalCompositeOperation = "copy";
            ctx.drawImage(canvas, 0, 0, fftSize, canvas.height - 1, 0, 1, fftSize, canvas.height - 1);
            ctx.globalCompositeOperation = "source-over";
            ctx.putImageData(imgData, 0, 0);

            // 2. Update EW Status & Reward
            const ea = data.ea_status;
            eaStatusText.innerText = ea.status.toUpperCase();
            if(data.sys_mode === 'MANUAL') {
                eaStatusText.style.color = ea.is_jamming ? 'var(--manual)' : '#555';
            } else {
                eaStatusText.style.color = ea.is_jamming ? 'var(--hazard)' : 'var(--success)';
            }
            
            targetCountEl.innerText = ea.target_count;
            totalRewardEl.innerText = ea.reward;

            // Update Reward Chart
            const rData = rewardChart.data.datasets[0].data;
            rData.shift();
            rData.push(ea.reward);
            rewardChart.update();

            // 3. Update Signal List & Radar
            sigCount.innerText = data.signals.length;
            signalList.innerHTML = '';
            
            // Reset radar data
            let radarData = [0,0,0,0,0,0,0,0];

            let latestMod = "Gürültü";
            data.signals.forEach(sig => {
                const item = document.createElement('div');
                item.className = 'signal-item';
                item.innerHTML = `
                    <div><strong style="color:var(--accent)">[${sig.track_id}] ${sig.type}</strong></div>
                    <div style="text-align:right">${sig.snr.toFixed(1)} dB</div>
                    <div style="font-size:0.7rem; opacity:0.6">RFI: ${sig.rfi_hash}</div>
                    <div style="font-size:0.75rem; text-align:right;">AoA: ${sig.aoa.toFixed(1)}°</div>
                `;
                signalList.appendChild(item);

                const bin = Math.floor(((sig.aoa + 22.5) % 360) / 45);
                radarData[bin] += sig.snr;
                latestMod = sig.type;
            });

            const maxRadar = Math.max(...radarData, 1);
            radarChart.data.datasets[0].data = radarData.map(v => (v / maxRadar) * 100);
            radarChart.update();

            // 4. Add Logs
            if (data.signals.length > 0 && Math.random() > 0.85) {
                const log = document.createElement('div');
                log.className = 'log-entry';
                let action = ea.is_jamming ? 'TAARRUZ/DB KAYDI' : 'TDOA KESTİRİMİ';
                log.innerHTML = `<span>[${new Date().toLocaleTimeString()}]</span> ${latestMod} tespiti. ${action}`;
                logs.prepend(log);
                if (logs.children.length > 30) logs.removeChild(logs.lastChild);
            }
        });
    </script>
</body>
</html>
