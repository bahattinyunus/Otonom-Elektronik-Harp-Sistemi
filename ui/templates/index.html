<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otonom-EH | Bilişsel Elektronik Harp Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: #151921;
            --accent: #00f2ff;
            --text: #e0e0e0;
            --hazard: #ff3e3e;
            --success: #00ff88;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            padding: 1rem 2rem;
            background: rgba(21, 25, 33, 0.8);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-group h1 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .title-group p {
            margin: 0;
            font-size: 0.7rem;
            opacity: 0.6;
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 1rem;
            padding: 1rem;
            background: radial-gradient(circle at center, #1a1f2b 0%, #0b0e14 100%);
        }

        #waterfall-container {
            position: relative;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #waterfall-canvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
        }

        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .panel {
            background: var(--panel-bg);
            border-radius: 8px;
            padding: 1rem;
            border-left: 3px solid var(--accent);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .panel-title {
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            opacity: 0.7;
            display: flex;
            justify-content: space-between;
        }

        #signal-list {
            list-style: none;
            padding: 0;
            margin: 0;
            font-size: 0.85rem;
        }

        .signal-item {
            padding: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: grid;
            grid-template-columns: 1fr 1fr;
            transition: background 0.3s;
        }

        .signal-item:hover {
            background: rgba(0, 242, 255, 0.05);
        }

        .status-badge {
            background: rgba(0, 255, 136, 0.1);
            color: var(--success);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        .system-logs {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.7rem;
            height: 150px;
            overflow-y: auto;
            color: rgba(255, 255, 255, 0.5);
        }

        .log-entry { margin-bottom: 2px; }
        .log-entry span { color: var(--accent); }

        /* Scanning Animation */
        .scan-line {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
            box-shadow: 0 0 15px var(--accent);
            opacity: 0.5;
            animation: scan 4s linear infinite;
            z-index: 10;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="title-group">
            <h1>Otonom-EH Suite v1.0</h1>
            <p>Cognitive Electronic Warfare Infrastructure | Simulation Mode: ACTIVE</p>
        </div>
        <div class="status-badge">SDR STREAM: ONLINE</div>
    </header>

    <main>
        <div id="waterfall-container">
            <div class="scan-line"></div>
            <canvas id="waterfall-canvas"></canvas>
        </div>

        <div class="side-panel">
            <div class="panel">
                <div class="panel-title">
                    <span>TESPİT EDİLEN SİNYALLER</span>
                    <span id="sig-count">0</span>
                </div>
                <div id="signal-list"></div>
            </div>

            <div class="panel" style="flex:1">
                <div class="panel-title">SİSTEM LOGLARI</div>
                <div class="system-logs" id="logs"></div>
            </div>

            <div class="panel">
                <div class="panel-title">ET DURUMU (KARŞI TEDBİR)</div>
                <div style="font-size: 1.2rem; font-weight: bold; color: var(--hazard)">LOOK-THROUGH PASİF</div>
                <p style="font-size: 0.7rem; opacity: 0.5;">AI-Reinforcement Learning Modülü bekleniyor...</p>
            </div>
        </div>
    </main>

    <script>
        const socket = io();
        const canvas = document.getElementById('waterfall-canvas');
        const ctx = canvas.getContext('2d');
        const signalList = document.getElementById('signal-list');
        const logs = document.getElementById('logs');
        const sigCount = document.getElementById('sig-count');

        // Waterfall state
        let fftSize = 1024;
        canvas.width = fftSize;
        canvas.height = 1000;
        let imgData = ctx.createImageData(fftSize, 1);

        socket.on('new_spectrum_data', (data) => {
            // 1. Draw Waterfall row
            const row = data.waterfall;
            for (let i = 0; i < row.length; i++) {
                // Map dBm values to color (-100 to -20 range)
                const val = (row[i] + 100) * 2.55; 
                imgData.data[i * 4] = val > 150 ? 255 : val * 0.5; // R
                imgData.data[i * 4 + 1] = val; // G
                imgData.data[i * 4 + 2] = 255 - val; // B
                imgData.data[i * 4 + 3] = 255; // A
            }
            
            // Shift canvas down and draw new row at top
            ctx.drawImage(canvas, 0, 0, fftSize, canvas.height - 1, 0, 1, fftSize, canvas.height - 1);
            ctx.putImageData(imgData, 0, 0);

            // 2. Update Signal List
            sigCount.innerText = data.signals.length;
            signalList.innerHTML = '';
            data.signals.forEach(sig => {
                const item = document.createElement('div');
                item.className = 'signal-item';
                item.innerHTML = `
                    <div><strong>${sig.type}</strong></div>
                    <div style="text-align:right">${sig.snr} dB SNR</div>
                    <div style="font-size:0.7rem; opacity:0.6">Idx: ${sig.freq_idx}</div>
                    <div style="font-size:0.7rem; text-align:right; color: #00f2ff">AoA: ${sig.aoa}°</div>
                `;
                signalList.appendChild(item);
            });

            // 3. Add Logs
            if (data.signals.length > 0 && Math.random() > 0.8) {
                const log = document.createElement('div');
                log.className = 'log-entry';
                log.innerHTML = `<span>[${new Date().toLocaleTimeString()}]</span> ${data.signals[0].type} sinyali tespit edildi. Konum güncellendi.`;
                logs.prepend(log);
            }
        });

        // Handle window resize
        window.addEventListener('resize', () => {
            // Keep actual canvas resolution, let CSS scale it
        });
    </script>
</body>
</html>
